---
- name: Checking if MySQL is already installed.
  ansible.builtin.shell: which mysqld_safe
  ignore_errors: true
  register: check_mysqld
  changed_when: false

- name: Check if MySQL datadir looks initialized
  ansible.builtin.stat:
    path: "{{ (mysql_datadir | default('/var/lib/mysql')) ~ '/mysql' }}"
  register: _deb_mysql_datadir_inited
  changed_when: false

# ---------------------------------------
# Compute vars (Debian/Ubuntu) - MySQL only
# ---------------------------------------
- name: Compute Debian/Ubuntu major version as int
  ansible.builtin.set_fact:
    __deb_major: "{{ ansible_facts.distribution_major_version | int }}"
  changed_when: false

- name: Compute apt python binding flag (Debian/Ubuntu)
  ansible.builtin.set_fact:
    __use_python3_apt: >-
      {{
        (ansible_distribution == 'Debian' and ((__deb_major | int) >= 11)) or
        (ansible_distribution == 'Ubuntu' and ((__deb_major | int) >= 20))
      }}
  changed_when: false

- name: Compute python apt binding package name
  ansible.builtin.set_fact:
    python_apt_pkg: "{{ 'python3-apt' if (__use_python3_apt | bool) else 'python-apt' }}"
  changed_when: false

- name: Set mysql_daemon + mysql_packages (MySQL only)
  ansible.builtin.set_fact:
    mysql_daemon: "mysql"
    mysql_packages: "{{ (__mysql_packages | list) + [python_apt_pkg] }}"
  changed_when: false

# Recommended bootstrap to avoid apt python binding issues
- name: Ensure python apt bindings present (bootstrap)
  ansible.builtin.raw: >
    apt-get update -y &&
    apt-get install -y {{ python_apt_pkg }}
  changed_when: false

# ---------------------------------------
# Existing tasks (keep your current ones)
# ---------------------------------------
- name: Updating apt cache if MySQL is not yet installed.
  ansible.builtin.apt:
    update_cache: yes
  when: check_mysqld.rc != 0

# ---------------------------------------
# MySQL official APT repository (Debian/Ubuntu)
# ---------------------------------------

- name: Install prerequisites for key management (gnupg, ca-certificates)
  ansible.builtin.apt:
    name:
      - gnupg
      - ca-certificates
    state: present
    update_cache: yes

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download MySQL APT repo package
  ansible.builtin.get_url:
    url: https://repo.mysql.com/mysql-apt-config.deb
    dest: /tmp/mysql-apt-config.deb
    mode: "0644"

- name: Install MySQL APT repo (non-interactive)
  ansible.builtin.shell: |
    set -euo pipefail
    DEBIAN_FRONTEND=noninteractive dpkg -i /tmp/mysql-apt-config.deb
  args:
    executable: /bin/bash
    creates: /etc/apt/sources.list.d/mysql.list
  changed_when: false

# Workaround: refresh repo signing key from Ubuntu keyserver
- name: Install MySQL repo signing key via HTTPS (Ubuntu keyserver)
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xB7B3B788A8D3785C" -o /tmp/mysql-keyserver.asc
    gpg --import /tmp/mysql-keyserver.asc
    gpg --yes --output /usr/share/keyrings/mysql-apt-config.gpg --export BCA43417C3B485DD128EC6D4B7B3B788A8D3785C
    rm -f /tmp/mysql-keyserver.asc
  args:
    executable: /bin/bash
  changed_when: false

- name: Update apt cache after adding MySQL repo
  ansible.builtin.apt:
    update_cache: yes

# --- Pin MySQL packages to repo.mysql.com ---
- name: Pin MySQL packages to repo.mysql.com
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/mysql
    mode: "0644"
    content: |
      Package: mysql-*
      Pin: origin "repo.mysql.com"
      Pin-Priority: 1001

- name: Update apt cache after pinning
  ansible.builtin.apt:
    update_cache: yes

# --- Fix dpkg/apt broken state (important if previous attempt failed) ---
- name: Fix interrupted dpkg state (if any)
  ansible.builtin.shell: |
    set -e
    dpkg --configure -a || true
    apt-get -f install -y || true
  args:
    executable: /bin/bash
  changed_when: false

# --- Ensure mysql-common comes from MySQL repo before mysql-server ---
- name: Install/upgrade mysql-common from MySQL repo first
  ansible.builtin.apt:
    name: mysql-common
    state: latest
    update_cache: no

- name: Making sure MySQL packages are installed.
  ansible.builtin.apt:
    name: "{{ mysql_packages }}"
    state: present
  register: deb_mysql_install_packages

- name: Making sure MySQL Python libraries are installed (Ubuntu <= 18).
  ansible.builtin.apt:
    name: python-mysqldb
    state: present
  when:
    - ansible_distribution == 'Ubuntu'
    - ansible_facts.distribution_major_version|int <= 18

- name: Making sure MySQL Python3 libraries are installed (Ubuntu > 18).
  ansible.builtin.apt:
    name: python3-mysqldb
    state: present
  when:
    - ansible_distribution == 'Ubuntu'
    - ansible_facts.distribution_major_version|int > 18

- name: Making sure MySQL is stopped after initial install.
  ansible.builtin.service:
    name: "{{ mysql_daemon }}"
    state: stopped
  when:
    - check_mysqld.rc != 0

- name: Deleting InnoDB log files created by apt package after initial install.
  ansible.builtin.file:
    path:
      - "{{ mysql_datadir | default('/var/lib/mysql') }}/ib_logfile0"
      - "{{ mysql_datadir | default('/var/lib/mysql') }}/ib_logfile1"
    state: absent
  when:
    - check_mysqld.rc != 0
    - not (_deb_mysql_datadir_inited.stat.exists | default(false))
  notify: start mysql

# ClusterControl repo (existing flow)
- name: Checking if ClusterControl Controller is already installed.
  ansible.builtin.stat:
    path: /etc/sbin/cmon
  register: cmon_installed
  changed_when: false

- name: Checking if ClusterControl repository file exists.
  ansible.builtin.stat:
    path: "{{ repo_config_path }}"
  register: s9s_repo_installed
  changed_when: false

- name: Installing ClusterControl CLI GPG key (apt).
  ansible.builtin.apt_key:
    url: "{{ clustercontrol_cli_key }}"
    state: present

- name: Configuring ClusterControl CLI repository.
  ansible.builtin.apt_repository:
    repo: "{{ clustercontrol_cli_repository }}"
    state: present

- name: Installing Severalnines GPG key (apt).
  ansible.builtin.apt_key:
    state: present
    url: "{{ gpg_key }}"
  when: s9s_repo_installed.stat.exists == false

- name: Installing ClusterControl repository file.
  ansible.builtin.get_url:
    url: "{{ repo_config_url }}"
    dest: "{{ repo_config_path }}"
    mode: "0644"
  when: s9s_repo_installed.stat.exists == false
  register: _deb_repo_file

# Update cache only when we changed repos OR on first run (safe, reduces changed noise)
- name: Updating apt cache after repository changes.
  ansible.builtin.apt:
    update_cache: yes
  when:
    - (_deb_repo_file is defined and _deb_repo_file.changed) or (s9s_repo_installed.stat.exists == false)

# -----------------------------
# Version selection logic (Debian)
# Supports:
# - latest
# - 2.3.3           (auto-pick: use 2.3.3-* if exists, otherwise fallback to latest per package)
# -----------------------------
- name: Compute version mode (Debian)
  ansible.builtin.set_fact:
    cc_pin_version: "{{ (clustercontrol_version | default('latest') | string) != 'latest' and (clustercontrol_version | string | length) > 0 }}"
    cc_semver_only: "{{ (clustercontrol_version | default('') | string) is match('^\\d+\\.\\d+\\.\\d+$') }}"
  changed_when: false

- name: Compute effective package state (Debian)
  ansible.builtin.set_fact:
    # When pinning, keep state=present to avoid upgrades.
    # Autopick and fallback-to-latest are done by choosing "pkg=version" strings in "name".
    cc_package_state_effective: "{{ 'present' if cc_pin_version else (cc_package_state | default('latest')) }}"
  changed_when: false

# Semver-only autopick + fallback per package
- name: Resolve version for controller+UI packages (Debian, semver-only; fallback to latest)
  ansible.builtin.shell: |
    set -euo pipefail
    pinned="$(apt-cache madison {{ item }} | awk '{print $3}' | grep -E '^{{ clustercontrol_version | regex_escape() }}-' | head -n1 || true)"
    if [ -n "$pinned" ]; then
      echo "$pinned"
      exit 0
    fi
    apt-cache madison {{ item }} | awk '{print $3}' | head -n1
  args:
    executable: /bin/bash
  register: _cc_deb_versions
  changed_when: false
  when:
    - cc_pin_version
    - cc_semver_only
  loop: "{{ (clustercontrol_controller_packages + clustercontrol_ui_packages) | unique }}"

- name: Build package->version map (Debian, semver-only)
  ansible.builtin.set_fact:
    _cc_deb_ver_map: "{{ dict(_cc_deb_versions.results | map(attribute='item') | zip(_cc_deb_versions.results | map(attribute='stdout'))) }}"
  changed_when: false
  when:
    - cc_pin_version
    - cc_semver_only

- name: Assert all versions resolved (Debian, semver-only)
  ansible.builtin.assert:
    that:
      - (_cc_deb_ver_map[item] | default('') | length) > 0
    fail_msg: "Could not resolve any repo version for package '{{ item }}' (check apt repo configuration)."
  when:
    - cc_pin_version
    - cc_semver_only
  loop: "{{ (clustercontrol_controller_packages + clustercontrol_ui_packages) | unique }}"

# Build effective package lists:
# - semver-only: pkg=<resolved version per pkg> (with fallback already applied)
# - explicit version: pkg={{clustercontrol_version}}
# - latest mode: just pkg names
- name: Compute effective package lists (Debian)
  ansible.builtin.set_fact:
    clustercontrol_controller_packages_effective: >-
      {{
        (
          clustercontrol_controller_packages
          | zip(clustercontrol_controller_packages | map('extract', _cc_deb_ver_map))
          | map('join', '=')
          | list
        )
        if (cc_pin_version and cc_semver_only)
        else
        (
          (
            clustercontrol_controller_packages
            | map('regex_replace', '$', '=' ~ (clustercontrol_version | string))
            | list
          )
          if cc_pin_version else clustercontrol_controller_packages
        )
      }}
    clustercontrol_ui_packages_effective: >-
      {{
        (
          clustercontrol_ui_packages
          | zip(clustercontrol_ui_packages | map('extract', _cc_deb_ver_map))
          | map('join', '=')
          | list
        )
        if (cc_pin_version and cc_semver_only)
        else
        (
          (
            clustercontrol_ui_packages
            | map('regex_replace', '$', '=' ~ (clustercontrol_version | string))
            | list
          )
          if cc_pin_version else clustercontrol_ui_packages
        )
      }}
  changed_when: false

- name: Installing ClusterControl Controller packages (from repo).
  ansible.builtin.apt:
    name: "{{ clustercontrol_controller_packages_effective }}"
    state: "{{ cc_package_state_effective }}"
  register: deb_clustercontrol_controller_install_packages

- name: Installing ClusterControl UI packages (from repo).
  ansible.builtin.apt:
    name: "{{ clustercontrol_ui_packages_effective }}"
    state: "{{ cc_package_state_effective }}"
  register: deb_clustercontrol_ui_install_packages

- name: Install ClusterControl CLI packages (always latest)
  ansible.builtin.apt:
    name: "{{ clustercontrol_cli_packages }}"
    state: latest
    update_cache: no
  register: deb_clustercontrol_cli_install_packages
