---
# -------------------------------------------------------------------
# Force MySQL Community 8.4 (LTS) on RHEL-like (8/9)
# -------------------------------------------------------------------

- name: Install EPEL repository
  ansible.builtin.yum:
    name: epel-release
    state: present

- name: Enable CRB repository (RHEL 9 only, required by EPEL)
  ansible.builtin.command: dnf config-manager --set-enabled crb
  when: ansible_facts.distribution_major_version | int == 9
  changed_when: false
  failed_when: false

- name: Install required base packages
  ansible.builtin.yum:
    name:
      - dnf-plugins-core
      - gnuplot
      - wget
    state: present

- name: Disable RHEL MySQL module (avoid AppStream MySQL)
  ansible.builtin.command: dnf -y module disable mysql
  changed_when: false
  failed_when: false

- name: Import MySQL GPG key
  ansible.builtin.rpm_key:
    state: present
    key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2023

- name: Install MySQL 8.4 community repo RPM
  ansible.builtin.yum:
    name: "https://repo.mysql.com/mysql84-community-release-el{{ ansible_facts.distribution_major_version }}-1.noarch.rpm"
    state: present

- name: Enable MySQL 8.4 repo, disable older repos
  ansible.builtin.shell: |
    set -euo pipefail
    dnf -y config-manager --disable mysql57-community mysql80-community >/dev/null 2>&1 || true
    dnf -y config-manager --enable mysql-8.4-lts-community
  args:
    executable: /bin/bash
  changed_when: false

- name: Remove MariaDB packages if present
  ansible.builtin.yum:
    name:
      - mariadb-libs
      - mariadb
      - mariadb-server
    state: absent
  failed_when: false

# -------------------------------------------------------------------
# Disable SELinux
# -------------------------------------------------------------------

- name: Disabling SElinux
  ansible.posix.selinux:
    state: disabled

# -------------------------------------------------------------------
# Disable firewalld
# -------------------------------------------------------------------

- name: Stop firewalld service
  ansible.builtin.service:
    name: firewalld
    state: stopped
  failed_when: false

- name: Disable firewalld at boot
  ansible.builtin.service:
    name: firewalld
    enabled: false
  failed_when: false

# -------------------------------------------------------------------
# Install MySQL 8.4 Packages
# -------------------------------------------------------------------

- name: Install MySQL 8.4 packages
  ansible.builtin.yum:
    name:
      - mysql-community-server
      - mysql-community-client
      - mysql-community-common
      - mysql-community-libs
    state: present
    update_cache: yes
  register: rh_mysql_install_packages

- name: Ensure MySQL Python libraries are installed
  ansible.builtin.yum:
    name: "{{ python_mysql }}"
    state: present

# -------------------------------------------------------------------
# MySQL 8 insecure initialization (ClusterControl compatibility)
# -------------------------------------------------------------------

- name: Check if mysql-community-server is installed
  ansible.builtin.command: rpm -q mysql-community-server
  register: _rpm_mysql_community_server
  changed_when: false
  failed_when: false

- name: Get mysql-community-server version
  ansible.builtin.command: rpm -q --qf '%{VERSION}\n' mysql-community-server
  register: _mysql_comm_ver
  changed_when: false
  failed_when: false
  when: _rpm_mysql_community_server.rc == 0

- name: Check if MySQL datadir is already initialized
  ansible.builtin.stat:
    path: "{{ (mysql_datadir | default('/var/lib/mysql')) ~ '/mysql' }}"
  register: _mysql_datadir_inited
  changed_when: false
  when:
    - _rpm_mysql_community_server.rc == 0
    - (_mysql_comm_ver.stdout | default('')) is match('^8\\.')

- name: Stop mysqld before initializing
  ansible.builtin.service:
    name: "{{ mysql_daemon | default('mysqld') }}"
    state: stopped
  failed_when: false
  when:
    - _rpm_mysql_community_server.rc == 0
    - (_mysql_comm_ver.stdout | default('')) is match('^8\\.')
    - not (_mysql_datadir_inited.stat.exists | default(false))

- name: Ensure MySQL datadir exists
  ansible.builtin.file:
    path: "{{ mysql_datadir | default('/var/lib/mysql') }}"
    state: directory
    owner: mysql
    group: mysql
    mode: "0755"
  when:
    - _rpm_mysql_community_server.rc == 0
    - (_mysql_comm_ver.stdout | default('')) is match('^8\\.')
    - not (_mysql_datadir_inited.stat.exists | default(false))

- name: Initialize MySQL 8 insecure if not initialized yet (NOT SAFE)
  ansible.builtin.command: >
    mysqld --initialize-insecure --user=mysql
    --basedir=/usr
    --datadir={{ mysql_datadir | default('/var/lib/mysql') }}
  args:
    creates: "{{ (mysql_datadir | default('/var/lib/mysql')) ~ '/mysql' }}"
  when:
    - _rpm_mysql_community_server.rc == 0
    - (_mysql_comm_ver.stdout | default('')) is match('^8\\.')
    - not (_mysql_datadir_inited.stat.exists | default(false))

# -------------------------------------------------------------------
# ClusterControl repository setup
# -------------------------------------------------------------------

- name: Check if ClusterControl Controller is already installed
  ansible.builtin.stat:
    path: /etc/sbin/cmon
  register: cmon_installed

- name: Check if ClusterControl repository file exists
  ansible.builtin.stat:
    path: "{{ repo_config_path }}"
  register: s9s_repo_installed

- name: Check if ClusterControl CLI repository file exists
  ansible.builtin.stat:
    path: "{{ repo_cli_config_path }}"
  register: s9s_cli_repo_installed

- name: Install Severalnines GPG key (RPM)
  ansible.builtin.rpm_key:
    state: present
    key: "{{ gpg_key }}"
  when: not s9s_repo_installed.stat.exists

- name: Download Severalnines Repository definition
  ansible.builtin.get_url:
    url: "{{ repo_config_url }}"
    dest: "{{ repo_config_path }}"
    mode: "0644"
  when: not s9s_repo_installed.stat.exists

- name: Download Severalnines CLI Repository definition
  ansible.builtin.get_url:
    url: "{{ clustercontrol_cli_repository }}"
    dest: "{{ repo_cli_config_path }}"
    mode: "0644"
  when: not s9s_cli_repo_installed.stat.exists

# -------------------------------------------------------------------
# Install ClusterControl packages
# -------------------------------------------------------------------

- name: Install ClusterControl Controller packages
  ansible.builtin.yum:
    name: "{{ clustercontrol_controller_packages }}"
    state: "{{ cc_package_state | default('latest') }}"
    update_cache: yes
  register: rh_clustercontrol_controller_install_packages

- name: Install ClusterControl UI packages
  ansible.builtin.yum:
    name: "{{ clustercontrol_ui_packages }}"
    state: "{{ cc_package_state | default('latest') }}"
    update_cache: yes
  register: rh_clustercontrol_ui_install_packages

- name: Install ClusterControl CLI packages
  ansible.builtin.yum:
    name: "{{ clustercontrol_cli_packages }}"
    state: latest
    update_cache: yes
  register: rh_clustercontrol_cli_install_packages
