---
# ==============
# ClusterControl
# ==============

# Install mode:
# - mcc    : Latest ClusterControl (no Apache/httpd), using cmon-proxy + ccmgradm
# - legacy : Legacy role (Apache/httpd + bootstrap.php)
cc_install_mode: "mcc"

# Package install behavior:
# - latest  : always install/upgrade to the newest version available in the repository
# - present : install if missing, do not upgrade
cc_package_state: "latest"

# ClusterControl version:
# - latest : follow repository newest version (default)
# - x.y.z  : install a specific version (pin)
#
# Note: when pinning a version, tasks will force package state to "present"
# to avoid auto-upgrades.
clustercontrol_version: "latest"

# Packages (MCC / latest)
clustercontrol_ui_packages:
  - clustercontrol-mcc
  - clustercontrol-notifications
  - clustercontrol-ssh
  - clustercontrol-cloud
  - clustercontrol-clud

clustercontrol_controller_packages:
  - clustercontrol-controller
  - clustercontrol-proxy
  - clustercontrol-kuber-proxy

clustercontrol_cli_packages:
  - s9s-tools

# MCC settings (following install-cc.sh flow)
mcc_web_port: 443
mcc_web_root: "/var/www/html/clustercontrol-mcc"

# Runtime / config paths
cmon_config_file: /etc/cmon.cnf
cmon_sql_path: /usr/share/cmon

# Controller URL
# (for MCC this is typically accessed via cmon-proxy; adjust only if needed)
rpc_url: http://localhost:9500

# Repository / GPG
gpg_key: http://repo.severalnines.com/severalnines-repos.asc

# =========================
# Credentials / Defaults
# =========================
mysql_root_username: root
mysql_root_password: password
cmon_mysql_password: cmon
cmon_mysql_port: 3306

cmon_ssh_user: root
cmon_ssh_key_path: /root/.ssh/id_rsa
cmon_ssh_key_dir: /root/.ssh

## Default User ##
# Define admin email address and set "set: true"
cc_admin:
  - set: false
#   email: "demo@severalnines.com"
#   password: "test123"

# ===============================
# MySQL/MariaDB on ClusterControl
# ===============================

# Set this to `yes` to forcibly update the root password.
mysql_root_password_update: no
mysql_enabled_on_startup: yes
overwrite_global_mycnf: yes

mysql_port: "{{ cmon_mysql_port }}"
mysql_bind_address: '0.0.0.0'
mysql_datadir: /var/lib/mysql
mysql_pid_file: "{{ mysql_datadir }}/mysql.pid"
mysql_user_home: /root
mysql_native_password: "ON"

mysql_key_buffer_size: "32M"
mysql_max_allowed_packet: "16M"
mysql_table_open_cache: "256"
mysql_sort_buffer_size: "1M"
mysql_read_buffer_size: "1M"
mysql_read_rnd_buffer_size: "4M"
mysql_thread_cache_size: "16"
mysql_max_connections: 151
mysql_wait_timeout: 28800
mysql_thread_concurrency: 2
mysql_mysqldump_max_allowed_packet: "64M"

mysql_innodb_file_per_table: "1"
mysql_innodb_log_file_size: "64M"
mysql_innodb_log_buffer_size: "8M"
mysql_innodb_flush_log_at_trx_commit: "1"
mysql_innodb_lock_wait_timeout: 50

mysql_users:
  - name: cmon
    host: "{{ ansible_facts['default_ipv4']['address'] }}"
    password: "{{ cmon_mysql_password }}"
    priv: '*.*:ALL,GRANT'
  - name: cmon
    host: "localhost"
    password: "{{ cmon_mysql_password }}"
    priv: '*.*:ALL,GRANT'
  - name: cmon
    host: "127.0.0.1"
    password: "{{ cmon_mysql_password }}"
    priv: '*.*:ALL,GRANT'